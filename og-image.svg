<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1020"/>
      <stop offset="100%" stop-color="#1a1b3a"/>
    </linearGradient>

    <radialGradient id="aurora1" cx="0.2" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="aurora2" cx="0.85" cy="0.7" r="0.55">
      <stop offset="0%" stop-color="#4caf50" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#4caf50" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="aurora3" cx="0.5" cy="1.05" r="0.5">
      <stop offset="0%" stop-color="#2196f3" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2196f3" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
